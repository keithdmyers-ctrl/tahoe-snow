    html += `<div class="compare-col">
      <div class="resort-name resort-border-${rn.toLowerCase()}">${rn}</div>
      ${compareRow('Peak Temp', `<span class="${tempClass(c.peak_temp_f)}">${f(c.peak_temp_f, '\u00B0F')}</span>`)}
      ${compareRow('Next 24h Snow', `<span class="snow-val">${f(c.peak_24h_snow_in, '"')}</span>`)}
      ${compareRow('Next 7 Days', `<span class="snow-val">${f(c.peak_7d_forecast_in, '"')}</span>`)}
      ${compareRow('Snowpack', `<span class="snow-val">${f(c.snowpack_depth_in, '"')}</span>`)}
      ${compareRow('Quality', esc(c.peak_quality || '\u2014'))}
      <div class="compare-detail">
        ${compareRow('Elevation', `${f(c.base_elev_ft)}\u2014${f(c.peak_elev_ft)} ft`)}
        ${compareRow('Vert Drop', f(c.vert_ft, ' ft'))}
        ${compareRow('Base Temp', f(c.base_temp_f, '\u00B0F'))}
        ${compareRow('Base/Peak Feels', `${f(c.base_feels_like_f, '\u00B0')} / ${f(c.peak_feels_like_f, '\u00B0')}`)}
        ${compareRow('<abbr class="jargon" title="Snow-to-Liquid Ratio: higher = fluffier powder">SLR</abbr>', f(c.peak_slr, ':1'))}
        ${compareRow('Base Precip', esc(c.base_precip_type || '\u2014'))}
        ${compareRow('Peak Precip', esc(c.peak_precip_type || '\u2014'))}
        ${compareRow('Base/Mid 24h', `${f(c.base_24h_snow_in, '"')} / ${f(c.mid_24h_snow_in, '"')}`)}
        ${compareRow('<abbr class="jargon" title="Snow Water Equivalent: water content of snowpack">SWE</abbr>', f(c.snowpack_swe_in, '"'))}
        ${compareRow('Aspect', esc(c.aspect || '\u2014'))}
      </div>
      <button class="compare-toggle" aria-expanded="false">More &#9662;</button>
    </div>`;
  }
  html += '</div>';

  html += `<div class="section mt-4">
    <button class="section-header" aria-expanded="true">
      7-Day Forecast &mdash; All Resorts (Peak) <span class="toggle" style="transform:rotate(180deg)">&#9662;</span>
    </button>
    <div class="section-body"><div class="chart-container chart-container--extra"><canvas id="chart-compare-all"></canvas></div></div>
  </div>`;

  document.getElementById('comparison-panel').innerHTML = html;
  document.getElementById('comparison-panel').classList.add('active');
  requestAnimationFrame(buildCompareChart);
}

function toggleCompareDetail(el) {
  const detail = el.previousElementSibling;
  const showing = detail.classList.contains('open');
  if (showing) {
    detail.style.maxHeight = detail.scrollHeight + 'px';
    requestAnimationFrame(() => { detail.classList.remove('open'); detail.style.maxHeight = '0'; });
  } else {
    detail.classList.add('open');
    detail.style.maxHeight = detail.scrollHeight + 'px';
    const clearMax = (e) => { if (e.propertyName === 'max-height') { detail.style.maxHeight = ''; detail.removeEventListener('transitionend', clearMax); } };
    detail.addEventListener('transitionend', clearMax);
  }
  el.innerHTML = showing ? 'More &#9662;' : 'Less &#9652;';
  el.setAttribute('aria-expanded', showing ? 'false' : 'true');
}

function compareRow(label, value) {
  return `<div class="compare-row"><span class="cr-label">${label}</span><span class="cr-value">${value}</span></div>`;
}

function rankBadge(label, resort) {
  const colorCls = resort ? `resort-color-${resort.toLowerCase()}` : 'color-dim';
  return `<span class="rank-row"><span class="rank-label">${label}:</span> <span class="rank-value ${colorCls}">${esc(resort || '\u2014')}</span></span>`;
}

function buildCompareChart() {
  const canvas = document.getElementById('chart-compare-all');
  if (!canvas) return;
  destroyChart('compare-all');

  const MAX_DAYS = 7;
  const datasets = [];
  let labels = [];

  for (const rn of RESORT_NAMES) {
    const spread = (DATA.resorts[rn]?.zones?.peak?.model_spread || []).slice(0, MAX_DAYS);
    if (labels.length === 0) {
      labels = spread.map(d => formatDateLabel(d.date));
    }
    datasets.push({
      label: rn + ' Snow',
      data: spread.map(d => (d.models?.GFS||{}).snow_in || 0),
      type: 'bar',
      backgroundColor: RESORT_COLORS[rn] + '66',
      borderColor: RESORT_COLORS[rn],
      borderWidth: 1,
      yAxisID: 'snow',
      order: 1,
    });
    datasets.push({
      label: rn + ' Temp',
      data: spread.map(d => (d.models?.GFS||{}).temp_high_f ?? null),
      type: 'line',
      borderColor: RESORT_COLORS[rn],
      backgroundColor: 'transparent',
      borderWidth: 2,
      borderDash: [4, 4],
      tension: 0.3,
      pointRadius: 3,
      pointBackgroundColor: RESORT_COLORS[rn],
      yAxisID: 'temp',
      order: 0,
    });
  }

  charts['compare-all'] = new Chart(canvas, {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: CHART_LEGEND,
        tooltip: CHART_TOOLTIP,
      },
      scales: {
        x: SCALE_X,
        snow: { position: 'left', ...SCALE_SNOW, grid: { color: '#1a263488' }, title: { display: true, text: 'Snow (in)', color: '#7ec8e3', font: { size: 11 } } },
        temp: { position: 'right', ...SCALE_TEMP, grid: { display: false }, title: { display: true, text: 'High Temp (\u00B0F)', color: '#ff8c42', font: { size: 11 } } },
      },
    },
  });
}

// -- SNOTEL --
const SNOTEL_COLORS = [
  '#7ec8e3', '#5b8def', '#a55eea', '#ff8c42', '#2ed573',
  '#ff4757', '#ffa502', '#45aaf2', '#d1d8e0', '#4a9eff', '#ff6b81'
];

function renderSnotel() {
  const snotel = DATA.snotel_current || {};
  const entries = Object.entries(snotel).filter(([n, d]) => !d.error).sort((a, b) => (b[1].snow_depth_in || 0) - (a[1].snow_depth_in || 0));

  const cssl = DATA.cssl;
  if (cssl && cssl.snow_depth_in != null) {
    entries.push(['CSSL (Snow Lab)', { snow_depth_in: cssl.snow_depth_in, swe_in: cssl.swe_in, elev_ft: cssl.elev_ft || 6890 }]);
    entries.sort((a, b) => (b[1].snow_depth_in || 0) - (a[1].snow_depth_in || 0));
  }

  const maxDepth = Math.max(...entries.map(([n, d]) => d.snow_depth_in || 0), 1);
  let html = '';
  for (const [name, d] of entries) {
    const depth = d.snow_depth_in || 0;
    const pct = (depth / maxDepth * 100).toFixed(0);
    html += `<div class="snotel-station">
      <span class="name">${esc(name)} (${d.elev_ft}ft)</span>
      <div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div>
      <span class="depth">${depth}"</span>
      <span class="swe"><abbr class="jargon" title="Snow Water Equivalent: water content of snowpack">SWE</abbr> ${f(d.swe_in, '"')}</span>
    </div>`;
  }
  document.getElementById('snotel-body').innerHTML = html;
}

// -- History --
function renderHistory() {
  const hist = DATA.snotel_history || {};
  const season = DATA.season_stats || {};

  // Build line chart of 10-day snow depth trends
  destroyChart('snotel-history');
  const canvas = document.getElementById('chart-snotel-history');
  const stationNames = Object.keys(hist).filter(n => {
    const depths = hist[n].SNWD || [];
    return depths.length > 0;
  });

  if (!canvas || !stationNames.length) return;

  // Collect all dates for x-axis
  const allDates = new Set();
  for (const sname of stationNames) {
    for (const [date] of (hist[sname].SNWD || [])) allDates.add(date);
  }
  const sortedDates = [...allDates].sort();
  const labels = sortedDates.map(d => {
    const parts = d.split('-');
    return `${parseInt(parts[1])}/${parseInt(parts[2])}`;
  });

  const datasets = stationNames.map((sname, i) => {
    const depthMap = {};
    for (const [date, val] of (hist[sname].SNWD || [])) depthMap[date] = val;
    return {
      label: sname,
      data: sortedDates.map(d => depthMap[d] ?? null),
      borderColor: SNOTEL_COLORS[i % SNOTEL_COLORS.length],
      backgroundColor: SNOTEL_COLORS[i % SNOTEL_COLORS.length] + '22',
      borderWidth: 2,
      tension: 0.3,
      pointRadius: 3,
      pointBackgroundColor: SNOTEL_COLORS[i % SNOTEL_COLORS.length],
      fill: false,
      spanGaps: true,
    };
  });

  charts['snotel-history'] = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { ...CHART_LEGEND, position: 'bottom' },
        tooltip: {
          ...CHART_TOOLTIP,
          callbacks: {
            label: ctx => ctx.raw != null ? `${ctx.dataset.label}: ${ctx.raw}"` : '',
          },
        },
      },
      scales: {
        x: { ...SCALE_X },
        y: {
          ...SCALE_SNOW,
          grid: { color: '#1a263488' },
          title: { display: true, text: 'Snow Depth (in)', color: '#7ec8e3', font: { size: 11 } },
        },
      },
    },
  });

  // Season stats summary below the chart
  let statsHtml = '<div class="season-stats-row">';
  for (const sname of stationNames) {
    const s = season[sname] || {};
    const snwd = s.SNWD || {};
    const wteq = s.WTEQ || {};
    if (!snwd.peak) continue;
    statsHtml += `<div class="station-stat">
      <span class="station-name">${sname}</span>
      <span class="station-sep"> &mdash; </span>
      <span class="station-current">${snwd.current}"</span>
      <span class="station-dim"> now, </span>

// -- Decision Banner --
function renderDecision() {
  const d = DATA.decision;
  if (!d || d.score == null) {
    document.getElementById('decision-section').innerHTML = '';
    return;
  }
  const colorCls = d.score >= 75 ? 'green' : d.score >= 45 ? 'yellow' : 'red';
  const factors = d.factors || {};
  let factorHtml = '';
  if (factors.snow != null) factorHtml += `<span class="decision-factor">Snow <span class="df-val">${factors.snow}</span></span>`;
  if (factors.quality != null) factorHtml += `<span class="decision-factor">Quality <span class="df-val">${factors.quality}</span></span>`;
  if (factors.lifts != null) factorHtml += `<span class="decision-factor">Lifts <span class="df-val">${factors.lifts}</span></span>`;
  if (factors.avalanche != null) factorHtml += `<span class="decision-factor">Avy <span class="df-val">${factors.avalanche}</span></span>`;
  if (factors.chains != null) factorHtml += `<span class="decision-factor">Chains <span class="df-val">${factors.chains}</span></span>`;
  if (factors.crowd != null && factors.crowd < 1.0) factorHtml += `<span class="decision-factor">Crowd <span class="df-val">${Math.round(factors.crowd * 100)}%</span></span>`;
  if (factors.agreement != null && factors.agreement !== 0) factorHtml += `<span class="decision-factor">Agreement <span class="df-val">${factors.agreement > 0 ? '+' : ''}${factors.agreement}</span></span>`;

  let bestLine = '';
  if (d.best_day && d.best_resort) {
    bestLine = `Best day: ${esc(d.best_day)} at ${esc(d.best_resort)}`;
  } else if (d.best_resort) {
    bestLine = `Best resort: ${esc(d.best_resort)}`;
  }

  document.getElementById('decision-section').innerHTML = `
    <div class="decision-banner">
      <div class="decision-score ${colorCls}">${d.score}</div>
      <div class="decision-info">
        <div class="decision-label">${esc(d.label || '')}</div>
        ${bestLine ? `<div class="decision-best">${bestLine}</div>` : ''}
        ${d.reasoning ? `<div class="decision-reasoning">${esc(d.reasoning)}</div>` : ''}
        ${factorHtml ? `<div class="decision-factors">${factorHtml}</div>` : ''}
      </div>
    </div>`;
}

// -- Model Comparison Panel --
function renderModelComparison() {
  const heavenly = DATA.resorts?.Heavenly;
  if (!heavenly) return;
  const peak = heavenly.zones?.peak;
  if (!peak || !peak.model_spread) return;
  const spread = peak.model_spread || [];

  const modelNames = ['GFS', 'ECMWF', 'ICON', 'HRRR'];
  const weights = DATA.model_weights || {};

  const modelTotals = {};
  for (const mn of modelNames) {
    modelTotals[mn] = { d1: 0, d2: 0, d3: 0, d7: 0 };
    for (let i = 0; i < Math.min(spread.length, 7); i++) {
      const snow = (spread[i]?.models?.[mn]?.snow_in) || 0;
      if (i < 1) modelTotals[mn].d1 += snow;
      if (i < 2) modelTotals[mn].d2 += snow;
      if (i < 3) modelTotals[mn].d3 += snow;
      modelTotals[mn].d7 += snow;
    }
  }

  const blended = { d1: 0, d2: 0, d3: 0, d7: 0 };
  const timeline = peak.timeline_48h || [];
  blended.d1 = timeline.slice(0, 24).reduce((s, h) => s + (h.snowfall_in || 0), 0);
  blended.d2 = timeline.slice(0, 48).reduce((s, h) => s + (h.snowfall_in || 0), 0);
  blended.d3 = blended.d2;
  blended.d7 = peak.snow_7d_forecast || 0;

  const nwsGrids = DATA.nws_grids;
  let nwsSnow24 = 0, nwsSnow48 = 0, nwsSnow72 = 0, nwsSnow7d = 0;
  if (nwsGrids && nwsGrids.snowfallAmount) {
    const now = new Date();
    for (const v of nwsGrids.snowfallAmount) {
      try {
        const start = new Date(v.start);
        const hoursFromNow = (start - now) / 3600000;
        if (hoursFromNow < 24) nwsSnow24 += v.value || 0;
        if (hoursFromNow < 48) nwsSnow48 += v.value || 0;
        if (hoursFromNow < 72) nwsSnow72 += v.value || 0;
        if (hoursFromNow < 168) nwsSnow7d += v.value || 0;
      } catch(e) {}
    }
  }

  const nbm = DATA.nbm;
  let nbmMaxPop = 0;
  if (nbm && nbm.hourly && nbm.hourly.precipitation_probability) {
    nbmMaxPop = Math.max(...(nbm.hourly.precipitation_probability.slice(0, 24).filter(v => v != null)));
  }

  let tableHtml = `<table class="data-table">
    <thead><tr><th>Model</th><th>24h Snow</th><th>48h Snow</th><th>72h Snow</th><th>7-Day Snow</th><th>Weight</th></tr></thead>
    <tbody>`;

  for (const mn of modelNames) {
    const t = modelTotals[mn];
    const w = weights[mn];
    const wStr = w != null ? (w * 100).toFixed(0) + '%' : '--';
    const hasData = spread.some(d => d.models?.[mn]?.snow_in != null);
    if (!hasData) continue;
    tableHtml += `<tr>
      <td>${esc(mn)}</td>
      <td class="snow-val">${t.d1.toFixed(1)}"</td>
      <td class="snow-val">${t.d2.toFixed(1)}"</td>
      <td class="snow-val">${t.d3.toFixed(1)}"</td>
      <td class="snow-val">${t.d7.toFixed(1)}"</td>
      <td>${wStr}</td>
    </tr>`;
  }

  if (nwsSnow24 > 0 || nwsSnow7d > 0) {
    tableHtml += `<tr>
      <td>NWS Human</td>
      <td class="snow-val">${nwsSnow24.toFixed(1)}"</td>
      <td class="snow-val">${nwsSnow48.toFixed(1)}"</td>
      <td class="snow-val">${nwsSnow72.toFixed(1)}"</td>
      <td class="snow-val">${nwsSnow7d.toFixed(1)}"</td>
      <td>--</td>
    </tr>`;
  }

  if (nbm) {
    tableHtml += `<tr>
      <td><abbr class="jargon" title="National Blend of Models: NWS consensus forecast">NBM</abbr></td>
      <td colspan="4" class="text-sm color-dim">Precip prob: ${nbmMaxPop}% (24h max)</td>
      <td>--</td>
    </tr>`;
  }

  tableHtml += `<tr class="model-table-highlight">
    <td><abbr class="jargon" title="Bayesian Model Averaging: weighted model blend">BMA</abbr> Blended</td>
    <td class="snow-val">${blended.d1.toFixed(1)}"</td>
    <td class="snow-val">${blended.d2.toFixed(1)}"</td>
    <td class="snow-val">${blended.d3.toFixed(1)}"</td>
    <td class="snow-val">${blended.d7.toFixed(1)}"</td>
    <td>--</td>
  </tr>`;

  const ens = DATA.ensemble;
  if (ens && ens.models) {
    let ensLabel = '';
    for (const [ml, daily] of Object.entries(ens.models)) {
      if (Array.isArray(daily) && daily.length > 0) {
        const d1 = daily[0];
        ensLabel += `${ml}: ${d1.snow_p10 || 0}-${d1.snow_p90 || 0}" (p10-p90) `;
      }
    }
    if (ensLabel) {
      tableHtml += `<tr>
        <td>Ensemble Range</td>
        <td colspan="5" class="text-sm color-dim">${esc(ensLabel.trim())}</td>
      </tr>`;
    }
  }

  tableHtml += '</tbody></table>';
  document.getElementById('model-comp-table-wrap').innerHTML = tableHtml;

  const previewEl = document.getElementById('preview-model-comp');
  if (previewEl) {
    const totalModels = modelNames.filter(mn => spread.some(d => d.models?.[mn]?.snow_in != null)).length;
    previewEl.textContent = `\u2014 ${totalModels} models, blended ${blended.d1.toFixed(1)}" 24h`;
  }

  let sourcesHtml = '';

  if (nwsGrids) {
    sourcesHtml += '<div class="panel-label mt-3">NWS Forecaster-Edited Data</div><div class="source-grid">';
    if (nwsGrids.snowfallAmount && nwsGrids.snowfallAmount.length > 0) {
      sourcesHtml += `<div class="source-card"><div class="sc-label">NWS Snow (24h)</div><div class="sc-value snow-val">${nwsSnow24.toFixed(1)}"</div><div class="sc-sub">Forecaster-edited gridpoint</div></div>`;
    }
    if (nwsGrids.snowLevel && nwsGrids.snowLevel.length > 0) {
      const sl = nwsGrids.snowLevel[0];
      sourcesHtml += `<div class="source-card"><div class="sc-label">NWS Snow Level</div><div class="sc-value">${sl.value.toLocaleString()}'</div><div class="sc-sub">Forecaster estimate</div></div>`;
    }
    if (nwsGrids.probabilityOfPrecipitation && nwsGrids.probabilityOfPrecipitation.length > 0) {
      const maxPop = Math.max(...nwsGrids.probabilityOfPrecipitation.slice(0, 8).map(v => v.value || 0));
      sourcesHtml += `<div class="source-card"><div class="sc-label">NWS Precip Prob</div><div class="sc-value">${maxPop}%</div><div class="sc-sub">Next 48h max</div></div>`;
    }
    sourcesHtml += '</div>';
  }

  const normals = DATA.normals;
  if (normals && !normals.error) {
    sourcesHtml += '<div class="panel-label mt-3">Climate Normals &amp; Anomaly</div><div class="source-grid">';
    if (normals.temp_normal_f != null) {
      const obs = DATA.current_conditions?.observation;
      const currentTemp = obs?.temp_f || DATA.current_conditions?.lake_level_temp_f;
      const anomaly = currentTemp != null ? (currentTemp - normals.temp_normal_f).toFixed(1) : null;
      const anomStr = anomaly != null ? (parseFloat(anomaly) >= 0 ? '+' + anomaly : anomaly) + '\u00B0F' : '';
      sourcesHtml += `<div class="source-card"><div class="sc-label">Normal High</div><div class="sc-value">${normals.temp_normal_f}\u00B0F</div><div class="sc-sub">${anomStr ? 'Anomaly: ' + anomStr : '30-yr avg'}</div></div>`;
    }
    if (normals.precip_normal_in != null) {
      sourcesHtml += `<div class="source-card"><div class="sc-label">Normal Precip</div><div class="sc-value">${normals.precip_normal_in}"</div><div class="sc-sub">Monthly average</div></div>`;
    }
    sourcesHtml += '</div>';
  }

  const synoptic = DATA.synoptic;
  if (synoptic && synoptic.stations && synoptic.stations.length > 0) {
    const stns = synoptic.stations.slice(0, 6);
    sourcesHtml += `<div class="panel-label mt-3">Nearby Weather Stations (Synoptic/MesoWest)</div><div class="source-grid">`;
    for (const stn of stns) {
      const name = stn.name || stn.stid || 'Station';
      const temp = stn.temp_f;
      const elev = stn.elev_ft;
      const wind = stn.wind_mph;
      sourcesHtml += `<div class="source-card">
        <div class="sc-label">${esc(name)}</div>
        <div class="sc-value ${tempClass(temp)}">${temp != null ? Math.round(temp) + '\u00B0F' : '\u2014'}</div>
        <div class="sc-sub">${elev ? elev + ' ft' : ''} ${wind != null ? '| Wind ' + Math.round(wind) + ' mph' : ''}</div>
      </div>`;
    }
    sourcesHtml += '</div>';
  }

  document.getElementById('data-sources-panel').innerHTML = sourcesHtml;
  buildModelComparisonChart(spread, modelNames, modelTotals, nwsSnow24, blended);
}

function buildModelComparisonChart(spread, modelNames, modelTotals, nwsSnow24, blended) {
  const canvas = document.getElementById('chart-model-comparison');
  if (!canvas) return;
  destroyChart('model-comparison');

  const labels = spread.slice(0, 7).map(d => formatDateLabel(d.date));
  const colors = { GFS: '#4a9eff', ECMWF: '#2ed573', ICON: '#ffa502', HRRR: '#a55eea' };
  const datasets = [];

  for (const mn of modelNames) {
    const hasData = spread.some(d => d.models?.[mn]?.snow_in != null);
    if (!hasData) continue;
    datasets.push({
      label: mn,
      data: spread.slice(0, 7).map(d => (d.models?.[mn]?.snow_in) || 0),
      backgroundColor: (colors[mn] || '#99aabb') + '88',
      borderColor: colors[mn] || '#99aabb',
      borderWidth: 1,
    });
  }

  const ens = DATA.ensemble;
  if (ens && ens.models) {
    for (const [ml, daily] of Object.entries(ens.models)) {
      if (Array.isArray(daily) && daily.length > 0) {
        datasets.push({
          label: ml + ' p90',
          data: daily.slice(0, 7).map(d => d.snow_p90 || 0),
          type: 'line',
          borderColor: ml === 'GFS' ? '#4a9eff44' : '#2ed57344',
          backgroundColor: ml === 'GFS' ? '#4a9eff11' : '#2ed57311',
          fill: true,
          borderWidth: 1,
          borderDash: [3, 3],
          pointRadius: 0,
          tension: 0.3,
        });
        break;
      }
    }
  }

  charts['model-comparison'] = new Chart(canvas, {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: CHART_LEGEND,
        tooltip: {
          ...CHART_TOOLTIP,
          callbacks: {
            afterBody: function(ctx) {
              const i = ctx[0].dataIndex;
              const d = spread[i];
              if (!d) return '';
              return `Spread: ${d.snow_spread}" | Confidence: ${d.confidence}`;
            }
          }
        },
      },
      scales: {
        x: SCALE_X,
        y: { ...SCALE_SNOW, grid: { color: '#1a263488' }, title: { display: true, text: 'Snow (in)', color: '#7ec8e3', font: { size: 11 } } },
      },
    },
  });
}

// -- Storm History --
function renderStormHistory() {
  const history = DATA.storm_history || [];
  const el = document.getElementById('storm-history-body');
  if (!el) return;

  if (!history.length) {
    el.innerHTML = '<div class="state-message">No storms archived yet. Storm events are logged automatically when detected by barometric pressure analysis.</div>';
    const preview = document.getElementById('preview-storm-history');
    if (preview) preview.textContent = '\u2014 No storms archived';
    return;
  }

  const recent = history.slice(-10).reverse();
  let html = '<div class="scroll-wrap"><table class="data-table"><thead><tr>';
  html += '<th>Date</th><th>Duration</th><th>Total</th><th>Peak Rate</th><th>Max Wind</th><th>Best Model</th>';
  html += '</tr></thead><tbody>';

  let totalSnow = 0;
  let totalStorms = recent.length;

  for (const storm of recent) {
    const startDate = storm.start_date ? new Date(storm.start_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '--';
    const dur = storm.duration_hours ? storm.duration_hours + 'h' : '--';
    const total = storm.total_precip_in || 0;
    totalSnow += total;
    const peakRate = storm.peak_snow_rate ? storm.peak_snow_rate + '"/hr' : '--';
    const maxWind = storm.max_wind ? storm.max_wind + ' mph' : '--';

    let bestModel = '--';
    const perf = storm.model_performance || {};
    let minError = Infinity;
    for (const [mn, mp] of Object.entries(perf)) {
      if (mp.error != null && mp.error < minError) {
        minError = mp.error;
        bestModel = mn;
      }
    }

    html += `<tr>
      <td>${startDate}</td>
      <td>${dur}</td>
      <td class="snow-val">${total}"</td>
      <td>${peakRate}</td>
      <td>${maxWind}</td>
      <td>${esc(bestModel)}</td>
    </tr>`;
  }
  html += '</tbody></table></div>';

  const avgError = history.reduce((sum, s) => {
    const errs = Object.values(s.model_performance || {}).map(m => m.error || 0);
    return sum + (errs.length ? errs.reduce((a, b) => a + b, 0) / errs.length : 0);
  }, 0) / (history.length || 1);

  html += `<div class="storm-history-summary">
    <div class="shs-item"><span class="shs-label">Total storms:</span> <span class="shs-value">${history.length}</span></div>
    <div class="shs-item"><span class="shs-label">Season total:</span> <span class="shs-value">${totalSnow.toFixed(1)}"</span></div>
    <div class="shs-item"><span class="shs-label">Avg model error:</span> <span class="shs-value">${avgError.toFixed(1)}"</span></div>
  </div>`;

  el.innerHTML = html;

  const preview = document.getElementById('preview-storm-history');
  if (preview) {
    preview.textContent = `\u2014 ${history.length} storms, ${totalSnow.toFixed(0)}" total`;
  }
}

      </div>`;

  const leadBreakdown = v.lead_time_breakdown || {};
  if (Object.keys(leadBreakdown).length > 0) {

function buildWeightsChart(weights) {
  const canvas = document.getElementById('chart-verify-weights');
  if (!canvas) return;
  destroyChart('verify-weights');

  const labels = Object.keys(weights);
  const values = Object.values(weights);
  if (!labels.length) {
    canvas.parentElement.innerHTML = '<div class="state-message">No weight data yet</div>';
    return;
  }

  const colors = ['#4a9eff', '#2ed573', '#ff8c42', '#a55eea', '#ff4757', '#ffa502', '#45aaf2', '#7ec8e3'];

  charts['verify-weights'] = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        data: values.map(v => Math.round(v * 100)),
        backgroundColor: labels.map((_, i) => colors[i % colors.length] + '88'),
        borderColor: labels.map((_, i) => colors[i % colors.length]),
        borderWidth: 1,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          ...CHART_TOOLTIP,
          callbacks: { label: ctx => `${ctx.raw}%` }
        },
      },
      scales: {
        x: { ...SCALE_X, min: 0, max: 100, ticks: { ...SCALE_X.ticks, callback: v => v + '%' } },
        y: { ...SCALE_X },
      },
    },
  });
}

function buildPopChart(popCal) {
  const canvas = document.getElementById('chart-verify-pop');
  if (!canvas) return;
  destroyChart('verify-pop');

  const bins = Object.keys(popCal).sort();
  if (!bins.length) {
    canvas.parentElement.innerHTML = '<div class="state-message">No PoP calibration data yet</div>';
    return;
  }

  const predicted = bins.map(b => {
    const parts = b.replace('%', '').split('-');
    return (parseInt(parts[0]) + parseInt(parts[1])) / 2;
  });
  const observed = bins.map(b => Math.round((popCal[b].observed_freq || 0) * 100));

  charts['verify-pop'] = new Chart(canvas, {
    type: 'line',
    data: {
      labels: bins,
      datasets: [
        {
          label: 'Observed Frequency',
          data: observed,
          borderColor: '#4a9eff',
          backgroundColor: '#4a9eff22',
          borderWidth: 2,
          pointRadius: 4,
          pointBackgroundColor: '#4a9eff',
          fill: true,
          tension: 0.3,
        },
        {
          label: 'Perfect Calibration',
          data: predicted,
          borderColor: '#99aabb44',
          borderWidth: 1,
          borderDash: [6, 4],
          pointRadius: 0,
          fill: false,
        },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: CHART_LEGEND,
        tooltip: {
          ...CHART_TOOLTIP,
          callbacks: {
            label: ctx => `${ctx.dataset.label}: ${ctx.raw}%`,
          },
        },
      },
      scales: {
        x: { ...SCALE_X, title: { display: true, text: 'Predicted PoP Bin', color: '#99aabb', font: { size: 11 } } },
        y: { min: 0, max: 100, ticks: { color: '#99aabb', callback: v => v + '%' }, grid: { color: '#1a263488' }, title: { display: true, text: 'Observed %', color: '#99aabb', font: { size: 11 } } },
      },
    },
  });
}
// -- Init --
loadData();
setInterval(() => loadData(), 900000);
// Update staleness indicator every minute
setInterval(() => {
  if (DATA && DATA.generated) {
    try { updateStaleness(new Date(DATA.generated)); } catch(e) {}
  }
}, 60000);

// Resort tab scroll hint
document.addEventListener('DOMContentLoaded', () => {
  const tabs = document.getElementById('resort-tabs');
  if (tabs) {
    const check = () => {
      const overflows = tabs.scrollWidth > tabs.clientWidth + 4;
      tabs.classList.toggle('overflowing', overflows);
      const atEnd = tabs.scrollLeft + tabs.clientWidth >= tabs.scrollWidth - 4;
      tabs.classList.toggle('scrolled-end', atEnd);
    };
    tabs.addEventListener('scroll', check, { passive: true });
    new ResizeObserver(check).observe(tabs);
    check();
  }
});

// Scroll-wrap overflow detection for table masks
function initScrollWraps() {
  document.querySelectorAll('.scroll-wrap').forEach(sw => {
    const check = () => {
      const overflows = sw.scrollWidth > sw.clientWidth + 4;
      sw.classList.toggle('overflowing', overflows);
      const atEnd = sw.scrollLeft + sw.clientWidth >= sw.scrollWidth - 4;
      sw.classList.toggle('scrolled-end', atEnd);
    };
    sw.addEventListener('scroll', check, { passive: true });
    new ResizeObserver(check).observe(sw);
    check();
  });
}

// Event delegation for section toggles, compare detail, refresh, and retry actions
document.addEventListener('click', function(e) {
  // Section toggle
  const header = e.target.closest('.section-header');
  if (header) {
    toggleSection(header);
    // Lazy-build charts when sections expand
    const body = header.nextElementSibling;
    if (body) {
      requestAnimationFrame(() => {
        if (!body.classList.contains('collapsed')) {
          const canvases = body.querySelectorAll('canvas[id^="chart-models-"]');
          canvases.forEach(c => {
            const rn = c.id.replace('chart-models-', '');
            if (!charts[`models-${rn}`]) buildModelChart(rn);
          });
          if (body.querySelector('#chart-snotel-history') && !charts['snotel-history']) renderHistory();
          if (body.querySelector('#chart-model-comparison') && !charts['model-comparison']) renderModelComparison();
        }
      });
    }
    return;
  }

  // Compare detail toggle
  const compareBtn = e.target.closest('.compare-toggle');
  if (compareBtn) {
    toggleCompareDetail(compareBtn);
    return;
  }

  // Refresh button
  if (e.target.closest('#refresh-btn')) {
    refreshData();
    return;
  }

  // Retry buttons (dynamically generated in error states)
  const actionBtn = e.target.closest('[data-action]');
  if (actionBtn) {
    const action = actionBtn.dataset.action;
    if (action === 'retry-load') { _loadRetries = 0; loadData(); }
    else if (action === 'reload') { location.reload(); }
    return;
  }
});
</script>
